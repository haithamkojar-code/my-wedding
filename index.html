<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرى زفاف هيثم وصباح</title>
    
    <meta name="robots" content="noindex, nofollow">

    <style>
        /* إخفاء محتوى الصفحة في البداية لضمان الخصوصية */
        body {
            display: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfbf7;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            color: #333;
        }

        .main-container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        h2 {
            color: #7f8c8d;
            font-weight: 300;
            margin-top: 0;
        }

        .main-image {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin: 25px 0;
            border: 5px solid white;
        }

        .verse {
            font-style: italic;
            font-size: 1.2em;
            color: #5d6d7e;
            line-height: 1.8;
            margin: 30px 0;
            padding: 0 15px;
        }

        .video-button {
            background-color: #d4af37; /* لون ذهبي */
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            font-size: 1.1em;
            border-radius: 50px;
            transition: transform 0.3s ease, background-color 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .video-button:hover {
            background-color: #b8962d;
            transform: scale(1.05);
        }

        .date {
            margin-top: 50px;
            color: #bdc3c7;
            letter-spacing: 2px;
        }
    </style>

    <script>
        function checkPassword() {
            // كلمة السر الافتراضية (يمكنك تغييرها بين العلامتين)
            var password = prompt("الرجاء إدخال كلمة السر لمشاهدة ذكرى الزفاف:");
            
            if (password === "1982") { 
                document.body.style.display = "block"; // إظهار الصفحة إذا كانت صحيحة
            } else {
                alert("عذراً، كلمة السر خاطئة! حاول مرة أخرى.");
                window.location.reload(); // إعادة التحميل للمحاولة مجدداً
            }
        }
    </script>
</head>

<body onload="checkPassword()">

    <div class="main-container">
        <h3>بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</h3>
        
        <h1>هيثم 💙 صباح</h1>
        <h2>ذكرى عقد القران</h2>

        <img src="1000064509.jpg" alt="ذكرى الزفاف" class="main-image">

        <p class="verse">
            "وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً"
        </p>

        <a href="https://youtu.be/uZQm1VTvHIY?si=SX-jdO4vud3eqreF" class="video-button" target="_blank">
            🎥 مشاهدة فيديو الحفل
        </a>

        <div class="date">19 فبراير 2023</div>
    </div>

</body>
</html>
