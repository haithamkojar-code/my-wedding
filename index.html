    <title>ذكرى زفاف هيثم وصباح</title>
    
    <style>
        body {
            display: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfbf7;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            color: #333;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 { color: #2c3e50; font-size: 2.5em; margin-bottom: 10px; }
        h2 { color: #7f8c8d; font-weight: 300; margin-top: 0; }

        /* صندوق العرض التلقائي */
        .slideshow-box {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 350px;
            margin: 30px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 5px solid white;
            cursor: pointer;
            background-color: #fff;
        }

        .slideshow-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* لإظهار الصورة كاملة بدون نقص */
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* الصورة النشطة تظهر */
        .slideshow-box img.active {
            opacity: 1;
        }

        .photo-gallery {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .photo-gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .video-button {
            background-color: #d4af37;
            color: white !important;
            padding: 15px 35px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            margin: 20px 0;
        }

        .verse { font-style: italic; color: #5d6d7e; margin: 25px 0; font-size: 1.1em; }
        .date { margin-top: 40px; color: #bdc3c7; font-size: 0.9em; }
    </style>
</head>

<body onload="checkPassword()">

    <script>
        function checkPassword() {
            var password = prompt("الرجاء إدخال كلمة السر لرؤية الصفحة:");
            if (password === "1982") {
                document.body.style.display = "block";
                startSlideshow();
            } else {
                alert("عذراً، كلمة السر خاطئة!");
                location.reload();
            }
        }

        function showFullGallery() {
            document.getElementById('mainSlideshow').style.display = 'none';
            document.getElementById('fullGallery').style.display = 'grid';
        }

        let currentSlide = 0;
        function startSlideshow() {
            const slides = document.querySelectorAll('.slideshow-box img');
            if (slides.length > 0) {
                slides[0].classList.add('active'); // إظهار أول صورة فوراً
                setInterval(function() {
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                }, 4000); // تغيير الصورة كل 4 ثوانٍ
            }
        }
    </script>

    <div class="main-container">
